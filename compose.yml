services:
  app:
    image: python:3.13-slim
    working_dir: /app
    restart: unless-stopped
    command: [
      "sh",
      "-c",
      # "pip install --no-cache-dir uv && uv sync && uv run run.py"
      "pip install --no-cache-dir uv && uv sync && uv run opentelemetry-instrument --metrics_exporter otlp --logs_exporter otlp --traces_exporter otlp python run.py"
    ]
    environment:
      TZ: ${TZ:-UTC}
      UV_PROJECT_ENVIRONMENT: .venv_container
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-hackathon_db}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      FLASK_RUN_HOST: "0.0.0.0"
      FLASK_RUN_PORT: "5000"
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_TRACES_PROTOCOL: ${OTEL_EXPORTER_OTLP_TRACES_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_METRICS_PROTOCOL: ${OTEL_EXPORTER_OTLP_METRICS_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_LOGS_PROTOCOL: ${OTEL_EXPORTER_OTLP_LOGS_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-pe-hackathon}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_INITIALIZE: true
      DATABASE_SEED_DIRECTORY: ${DATABASE_SEED_DIRECTORY:-./seeds}
      LOG_DIR: ${LOG_DIR:-/app/logs}
    expose:
      - "${FLASK_RUN_PORT:-5000}"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      alloy:
        condition: service_started
      tempo:
        condition: service_started
    deploy:
      replicas: 3

  alloy:
    image: grafana/alloy:v1.8.3
    container_name: pe-hackathon-alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    expose:
      - "4317"
      - "4318"
    ports:
      - "12345:12345"
    volumes:
      - ./monitoring/alloy.alloy:/etc/alloy/config.alloy:ro
      - ./logs:/appLogs
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: pe-hackathon-nginx
    restart: unless-stopped
    ports:
      - "${APP_PROXY_PORT:-5001}:80"
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_started

  postgres:
    image: postgres:17
    container_name: pe-hackathon-postgres
    restart: unless-stopped
    command: postgres -c max_connections=10000
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pe-hackathon-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  loki:
    image: grafana/loki:3.7.1
    container_name: pe-hackathon-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki.yml"]
    expose:
      - "3100"
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.10.3
    container_name: pe-hackathon-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yml"]
    expose:
      - "3200"
      - "4317"
      - "4318"
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo

  prometheus:
    image: prom/prometheus:v3.11.0
    container_name: pe-hackathon-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-otlp-receiver
    expose:
      - "9090"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  influxdb:
    image: influxdb:1.0
    container_name: pe-hackathon-influxdb
    restart: unless-stopped
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB:-k6db}
      INFLUXDB_HTTP_AUTH_ENABLED: ${INFLUXDB_HTTP_AUTH_ENABLED:-false}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:12.4.2
    container_name: pe-hackathon-grafana
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  loki_data:
  tempo_data:
  prometheus_data:
  influxdb_data:
  grafana_data:
