services:
  app:
    image: python:3.13-slim
    container_name: pe-hackathon-app
    working_dir: /app
    command: sh -c "pip install --no-cache-dir uv && uv sync && uv run python run.py"
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-hackathon_db}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      FLASK_RUN_HOST: ${FLASK_RUN_HOST:-0.0.0.0}
      FLASK_RUN_PORT: ${FLASK_RUN_PORT:-5000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-pe-hackathon}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    ports:
      - "${FLASK_RUN_PORT:-5000}:${FLASK_RUN_PORT:-5000}"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      tempo:
        condition: service_started

  postgres:
    image: postgres:17
    container_name: pe-hackathon-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pe-hackathon-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  loki:
    image: grafana/loki:3.1.1
    container_name: pe-hackathon-loki
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  tempo:
    image: grafana/tempo:2.7.1
    container_name: pe-hackathon-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: pe-hackathon-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  influxdb:
    image: influxdb:1.0
    container_name: pe-hackathon-influxdb
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB:-k6db}
      INFLUXDB_HTTP_AUTH_ENABLED: ${INFLUXDB_HTTP_AUTH_ENABLED:-false}
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb

  grafana:
    image: grafana/grafana:11.2.0
    container_name: pe-hackathon-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
      tempo:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  loki_data:
  tempo_data:
  prometheus_data:
  influxdb_data:
  grafana_data:
