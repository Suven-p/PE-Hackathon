apiVersion: 1

datasources:
- name: Prometheus
  type: prometheus
  access: proxy
  url: http://prometheus:9090
  editable: true

- name: Loki
  type: loki
  access: proxy
  url: http://loki:3100
  editable: true

- name: Tempo
  type: tempo
  access: proxy
  url: http://tempo:3200
  editable: true

- name: InfluxDB-k6
  type: influxdb
  access: proxy
  url: http://influxdb:8086
  database: k6db
  isDefault: true
  editable: true
